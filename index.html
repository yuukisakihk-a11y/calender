<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神山カレンダー</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="神山Cal">
  <meta name="theme-color" content="#1a2744">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2744; }
    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #1a2744;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #c8a84b;
      font-family: sans-serif;
      z-index: 999;
    }
    #loading img { width: 100px; margin-bottom: 20px; border-radius: 20px; }
    #loading p { font-size: 16px; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icon.png" alt="神山カレンダー">
    <p>読み込み中...</p>
  </div>
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycby1TGPF17n_5DP1XKNeXSPWDeruKYFMCWCI8QtRU6y9rQLfqmJhBaKnSiTXm0toqflq/exec"
    allow="geolocation"
    onload="document.getElementById('loading').style.display='none'"
  ></iframe>
</body>
</html>
